TITLE_HELP_DLG = "Справка"
TXT_HELP_DLG_WELCOM_TO_USE = "Добро пожаловать в MusicPlayer2!"
TXT_HELP_DLG_SHOW_ONLINE_HELP = "Нажмите здесь для подробной онлайн-документации."
TXT_HELP_DLG_HELP_INFO = "[Введение в функции]\r\nMusicPlayer2 — это аудиоплеер, сочетающий в себе воспроизведение музыки, отображение текста, конвертацию форматов и многие другие функции. Он поддерживает отображение текста, режим караоке, онлайн-загрузку текстов, редактирование текстов, распознавание тегов песен, отображение обложек альбомов, онлайн-загрузку обложек, спектральный анализ, настройки звуковых эффектов, кнопки на миниатюре панели задач, темы оформления, конвертацию форматов и другие функции.\r\nЯдром воспроизведения является библиотека Bass Audio Library (V2.4).\r\nПлеер поддерживает практически все распространенные аудиоформаты. Подробный список поддерживаемых файлов показан в разделе «Поддерживаемые форматы» меню «Справка».\r\n\r\n[Инструкция по использованию]\r\nУ вас есть следующие способы открыть и воспроизвести песню:\r\n1. Выберите команду «Открыть файл» или «Открыть папку» в меню «Файл».\r\n2. В диалоговом окне «Медиатека» выберите ранее открытую папку на вкладке «Папка» или нажмите кнопку «Открыть новую папку», чтобы воспроизвести новую папку.\r\n3. В диалоговом окне «Медиатека» выберите ранее открытый плейлист на вкладке «Плейлист» или нажмите кнопку «Новый плейлист», чтобы создать новый плейлист.\r\n4. Перетащите файл или папку прямо в главное окно программы.\r\n5. Перетащите файл или папку прямо на значок программы или его ярлык.\r\n\r\n[Медиатека]\r\nНажмите кнопку «Медиатека» в правом верхнем углу главного интерфейса или используйте горячую клавишу Ctrl+T, чтобы открыть диалоговое окно Медиатеки.\r\nМедиатека предоставляет два режима: папки и плейлисты для управления и организации музыки.\r\nВ режиме папок каждый раз при открытии папки для воспроизведения плеер автоматически ищет аудиофайлы в папке и загружает их в плейлист. В этом режиме вы не можете добавлять, удалять, перемещать вверх и вниз элементы в списке.\r\nВ режиме плейлистов вы можете создать плейлист и свободно добавлять в него аудиофайлы. В этом режиме вы можете свободно редактировать элементы в списке, команды добавления, удаления, перемещения вверх и вниз доступны.\r\nВ режиме плейлистов есть два специальных плейлиста: «По умолчанию» и «Избранное». Вы не можете переименовывать или удалять эти два плейлиста. Аудиофайл, открытый из проводника, будет добавлен в плейлист «По умолчанию». Нажатие кнопки «Избранное» в главном интерфейсе добавит текущую песню в плейлист «Избранное».\r\n\r\n[Переключение интерфейса]\r\nВ настоящее время MusicPlayer2 предоставляет 2 встроенных макета интерфейса и несколько пользовательских макетов.\r\nВсе макеты интерфейса можно переключать через главное меню «Вид» -> подменю «Сменить интерфейс». Используйте горячую клавишу Ctrl+U для последовательного переключения всех доступных макетов или используйте горячие клавиши Ctrl+цифра для переключения на указанный интерфейс.\r\n\r\n【Пользовательский интерфейс】\r\nMusicPlayer2 поддерживает пользовательский макет интерфейса через xml-файлы. Пользовательские файлы интерфейса находятся в папке «skins» в директории программы.\r\nИнтерфейсы 1 и 2 в подменю «Сменить интерфейс» являются встроенными макетами программы, остальные предоставляются xml-файлами в папке skins. Чтобы узнать, как редактировать пользовательский макет интерфейса, нажмите «Справка» -> «Пользовательский интерфейс» в главном меню, чтобы просмотреть подробные инструкции.\r\n\r\n[Описание горячих клавиш]\r\nВоспроизведение/Пауза: Пробел\r\nПред. песня: V\r\nСлед. песня: N\r\nПеремотка вперед на 5 сек: Вправо\r\nПеремотка назад на 5 сек: Влево\r\nГромкость +: Вверх\r\nГромкость -: Вниз\r\nПереключить режим повтора: M\r\nБыстрый поиск: F\r\nВыбрать папку: Ctrl+T\r\nНайти песни: Ctrl+F\r\nОткрыть расположение файла: Ctrl+B\r\nПараметры: Ctrl+I\r\nОткрыть файл: Ctrl+O\r\nОткрыть папку: Ctrl+D\r\nКорректировка текста: Ctrl+PgUp/Ctrl+PgDn\r\nСохранить корректировку текста: Ctrl+S\r\nМини-режим: Ctrl+M\r\nИнформация о треке: Ctrl+N\r\nНастройки звуковых эффектов: Ctrl+E\r\nПолноэкранный режим: F11\r\nПоказать/скрыть плейлист: Ctrl+L\r\nПлавающий плейлист: Ctrl+K\r\nПовтор A-B: Ctrl+R\r\nСменить интерфейс: Ctrl+U/Ctrl+цифра\r\n\r\n[Действия мыши]\r\n- Используйте колесико мыши для регулировки громкости.\r\n- Удерживайте Shift и нажмите правую кнопку мыши, чтобы вызвать системное меню."
